<div class="sub-content">
  <img src="{{logoUrl}}" style="width: 15%;" />

  <div class="header">
    <div class="company-name">
      <b class="position-relative">{{entityName}}</b>
    </div>
    <div class="flex-row">
      <div class="position-relative">UEN No. : {{ uenNumber }} | GST Reg. No. : {{registerNumberGST}}</div>
    </div>
    <div class="position-relative">{{entityAddress}}</div>
    <div class="flex-row">
      <div class="position-relative">Phone : {{entityPhone}} | Email : {{entityEmail}}</div>
    </div>
  </div>
  
  <div style="line-height: 55%; vertical-align: center;">
    <b class="service-type">{{serviceType}}</b>
    <p class="text-align-right text-bold">No. {{serviceNumber}}</p>
  </div>
</div>
